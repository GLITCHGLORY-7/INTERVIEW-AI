# key parts only — merge into your job's steps
- name: Checkout
  uses: actions/checkout@v4

- name: Set up Node
  uses: actions/setup-node@v4
  with:
    node-version: '18'

- name: Install dependencies
  run: npm ci

- name: Build site
  run: npm run build   # ensure package.json has a build script that outputs to ./build or ./dist

- name: Setup Pages
  uses: actions/configure-pages@v5

- name: Upload artifact
  uses: actions/upload-pages-artifact@v3
  with:
    path: ./build   # or ./dist or ./public — point this to your build output

- name: Deploy to GitHub Pages
  id: deployment
  uses: actions/deploy-pages@v4
